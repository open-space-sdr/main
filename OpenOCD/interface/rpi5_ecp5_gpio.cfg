# RPi 5 as a bit-bang JTAG adapter via linuxgpiod

adapter driver linuxgpiod

# All these GPIOs are on gpiochip 4 on Raspberry Pi 5
# (RP1 I/O controller). :contentReference[oaicite:3]{index=3}
adapter gpio tck 14 -chip 4
adapter gpio tms 15 -chip 4
adapter gpio tdo 18 -chip 4
adapter gpio tdi 23 -chip 4

# Optional TRST (if your board exposes it and you wired GPIO22?TRST)
adapter gpio trst 22 -chip 4 -active-low

transport select jtag

# linuxgpiod bit-bang speed is ~800 kHz by default; this is a hint only.
# If your OpenOCD build supports it, you can try:
# adapter speed 1000
